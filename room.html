<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Flora Hostel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
        }
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="role">Login As:</label>
            <select id="role" class="form-control">
                <option value="student">Student</option>
                <option value="admin">Hostel Admin</option>
            </select>
        </div>
        <p id="errorMessage" class="error"></p>
        <div class="btn-container">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
    </form>
    <p class="mt-3">Not Registered? <a href="register.html">Register Here</a></p>
</div>

<!-- JavaScript to Handle Login -->
<script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();

        // Predefined login credentials
        const users = [
            { username: "student1", password: "student123", role: "student" },
            { username: "student2", password: "student456", role: "student" },
            { username: "admin", password: "admin123", role: "admin" }
        ];

        // Get entered values
        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();
        let role = document.getElementById("role").value;

        // Check if credentials are valid
        let user = users.find(user => user.username === username && user.password === password && user.role === role);

        if (user) {
            localStorage.setItem("loggedInUser", JSON.stringify(user)); // Store login session

            if (role === "student") {
                window.location.href = "student_dashboard.html"; // Redirect to Student Dashboard
            } else if (role === "admin") {
                window.location.href = "admin_dashboard.html"; // Redirect to Admin Dashboard
            }
        } else {
            document.getElementById("errorMessage").innerText = "Invalid username, password, or role!";
        }
    });
</script>

</body>
</html>
